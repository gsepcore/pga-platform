<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GSEP Thumbnail</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
  }

  .thumbnail {
    width: 1280px;
    height: 720px;
    background: #0d1117;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Ambient glow effects */
  .glow-1 {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(139, 92, 246, 0.25) 0%, transparent 70%);
    top: -150px;
    right: -100px;
  }

  .glow-2 {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(59, 130, 246, 0.2) 0%, transparent 70%);
    bottom: -150px;
    left: -100px;
  }

  .glow-3 {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(34, 197, 94, 0.15) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  /* DNA helix decoration */
  .dna-strand {
    position: absolute;
    left: 60px;
    top: 0;
    bottom: 0;
    width: 80px;
    opacity: 0.15;
  }

  .dna-dot {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #8b5cf6;
  }

  .dna-dot.right { background: #3b82f6; left: 60px; }
  .dna-dot.left { left: 0; }

  .dna-line {
    position: absolute;
    height: 2px;
    background: linear-gradient(90deg, #8b5cf6, #3b82f6);
    left: 4px;
    width: 60px;
  }

  /* Content */
  .content {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 0 100px;
  }

  .badge {
    display: inline-block;
    padding: 8px 24px;
    background: rgba(139, 92, 246, 0.2);
    border: 1px solid rgba(139, 92, 246, 0.5);
    border-radius: 50px;
    color: #c4b5fd;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 30px;
  }

  .main-title {
    font-size: 92px;
    font-weight: 900;
    color: #ffffff;
    line-height: 1.05;
    margin-bottom: 24px;
    text-shadow: 0 0 80px rgba(139, 92, 246, 0.4);
  }

  .main-title .highlight {
    background: linear-gradient(135deg, #8b5cf6, #3b82f6, #22c55e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 28px;
    color: #8b949e;
    font-weight: 400;
    margin-bottom: 36px;
  }

  .features {
    display: flex;
    justify-content: center;
    gap: 16px;
  }

  .feature-pill {
    padding: 10px 22px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    color: white;
  }

  .feature-pill.purple { background: rgba(139, 92, 246, 0.3); border: 1px solid rgba(139, 92, 246, 0.6); }
  .feature-pill.blue   { background: rgba(59, 130, 246, 0.3); border: 1px solid rgba(59, 130, 246, 0.6); }
  .feature-pill.green  { background: rgba(34, 197, 94, 0.3); border: 1px solid rgba(34, 197, 94, 0.6); }
  .feature-pill.cyan   { background: rgba(6, 182, 212, 0.3); border: 1px solid rgba(6, 182, 212, 0.6); }

  /* Corner logo */
  .logo-corner {
    position: absolute;
    bottom: 30px;
    right: 40px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 10;
  }

  .logo-corner .logo-text {
    font-size: 24px;
    font-weight: 900;
    color: #e6edf3;
    letter-spacing: 2px;
  }

  .logo-corner .version {
    font-size: 14px;
    color: #8b949e;
    font-weight: 400;
  }

  /* Patented badge */
  .patent-badge {
    position: absolute;
    top: 30px;
    right: 40px;
    padding: 8px 20px;
    background: rgba(245, 158, 11, 0.15);
    border: 1px solid rgba(245, 158, 11, 0.5);
    border-radius: 8px;
    color: #f59e0b;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    z-index: 10;
  }

  /* MIT badge */
  .mit-badge {
    position: absolute;
    top: 30px;
    left: 40px;
    padding: 8px 20px;
    background: rgba(34, 197, 94, 0.15);
    border: 1px solid rgba(34, 197, 94, 0.5);
    border-radius: 8px;
    color: #22c55e;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    z-index: 10;
  }

  /* Chromosome visualization on the right */
  .chromosomes {
    position: absolute;
    right: 50px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 8px;
    opacity: 0.3;
    z-index: 5;
  }

  .chromo-bar {
    width: 12px;
    border-radius: 6px;
  }

  .chromo-bar.c0 { height: 80px; background: linear-gradient(180deg, #ef4444, #dc2626); }
  .chromo-bar.c1 { height: 100px; background: linear-gradient(180deg, #3b82f6, #2563eb); }
  .chromo-bar.c2 { height: 70px; background: linear-gradient(180deg, #22c55e, #16a34a); }
  .chromo-bar.c3 { height: 60px; background: linear-gradient(180deg, #10b981, #059669); }
</style>
</head>
<body>
<div class="thumbnail">
  <!-- Background effects -->
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="glow-3"></div>

  <!-- Top badges -->
  <div class="mit-badge">MIT Licensed</div>
  <div class="patent-badge">Patentado</div>

  <!-- Chromosome bars (subtle decoration) -->
  <div class="chromosomes">
    <div class="chromo-bar c0"></div>
    <div class="chromo-bar c1"></div>
    <div class="chromo-bar c2"></div>
    <div class="chromo-bar c3"></div>
  </div>

  <!-- Main content -->
  <div class="content">
    <div class="badge">Genomic Self-Evolving Prompts</div>
    <h1 class="main-title">
      Your Agent,<br>But <span class="highlight">Alive</span>
    </h1>
    <p class="subtitle">AI agents that evolve their own prompts automatically</p>
    <div class="features">
      <span class="feature-pill purple">4 Chromosomes</span>
      <span class="feature-pill blue">6D Fitness</span>
      <span class="feature-pill green">Auto-Evolution</span>
      <span class="feature-pill cyan">5 LLMs</span>
    </div>
  </div>

  <!-- Bottom logo -->
  <div class="logo-corner">
    <span class="logo-text">GSEP</span>
    <span class="version">v0.8.0</span>
  </div>
</div>
</body>
</html>
