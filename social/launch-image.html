<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GSEP Launch</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 675px;
    overflow: hidden;
    font-family: 'Inter', -apple-system, sans-serif;
    background: #000;
  }

  .canvas {
    width: 1200px;
    height: 675px;
    position: relative;
    overflow: hidden;
    background: #000000;
  }

  /* ── Central DNA Organism ── */
  .organism {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 600px;
    z-index: 5;
  }

  .organism svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 60px rgba(139, 92, 246, 0.3))
            drop-shadow(0 0 120px rgba(6, 182, 212, 0.15));
  }

  /* ── Massive ambient glow — the "awakening" ── */
  .core-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle,
      rgba(139, 92, 246, 0.2) 0%,
      rgba(99, 102, 241, 0.1) 25%,
      rgba(6, 182, 212, 0.05) 50%,
      transparent 70%
    );
    z-index: 1;
  }

  .core-glow-inner {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle,
      rgba(255, 255, 255, 0.06) 0%,
      rgba(139, 92, 246, 0.15) 40%,
      transparent 70%
    );
    z-index: 2;
  }

  /* ── Horizon light beam ── */
  .horizon {
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg,
      transparent 5%,
      rgba(139, 92, 246, 0.05) 20%,
      rgba(139, 92, 246, 0.15) 40%,
      rgba(6, 182, 212, 0.2) 50%,
      rgba(139, 92, 246, 0.15) 60%,
      rgba(139, 92, 246, 0.05) 80%,
      transparent 95%
    );
    z-index: 3;
    box-shadow: 0 0 80px 20px rgba(139, 92, 246, 0.05);
  }

  /* ── Subtle radial lines ── */
  .radials {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 1200px;
    height: 675px;
    z-index: 2;
    opacity: 0.03;
  }

  /* ── Typography ── */
  .text-block {
    position: absolute;
    bottom: 60px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 20;
  }

  .tagline {
    font-size: 15px;
    font-weight: 300;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: rgba(139, 92, 246, 0.7);
    margin-bottom: 14px;
  }

  .title {
    font-size: 52px;
    font-weight: 200;
    color: #ffffff;
    letter-spacing: -1px;
    line-height: 1.1;
  }

  .title strong {
    font-weight: 900;
    background: linear-gradient(135deg, #a78bfa 0%, #06b6d4 60%, #34d399 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ── Top branding ── */
  .top-brand {
    position: absolute;
    top: 36px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
  }

  .top-brand .dna-emoji {
    font-size: 24px;
    line-height: 1;
  }

  .top-brand .brand-text {
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 6px;
    color: rgba(255, 255, 255, 0.9);
  }

  /* ── Subtle corner metadata ── */
  .meta-left {
    position: absolute;
    bottom: 28px;
    left: 40px;
    z-index: 20;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 2px;
    color: rgba(255, 255, 255, 0.2);
    text-transform: uppercase;
  }

  .meta-right {
    position: absolute;
    bottom: 28px;
    right: 40px;
    z-index: 20;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 2px;
    color: rgba(255, 255, 255, 0.2);
    text-transform: uppercase;
  }

  /* ── Noise texture overlay ── */
  .noise {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 50;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    pointer-events: none;
  }

  /* ── Vignette ── */
  .vignette {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 15;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
    pointer-events: none;
  }

  /* ── Floating micro-particles ── */
  .micro {
    position: absolute;
    border-radius: 50%;
    z-index: 6;
  }
</style>
</head>
<body>
<div class="canvas">

  <!-- Core glow -->
  <div class="core-glow"></div>
  <div class="core-glow-inner"></div>

  <!-- Horizon light -->
  <div class="horizon"></div>

  <!-- Central DNA Organism — the visual centerpiece -->
  <div class="organism">
    <svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Gradients -->
        <linearGradient id="strand-a" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0"/>
          <stop offset="20%" stop-color="#8b5cf6" stop-opacity="0.8"/>
          <stop offset="50%" stop-color="#a78bfa" stop-opacity="1"/>
          <stop offset="80%" stop-color="#8b5cf6" stop-opacity="0.8"/>
          <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
        </linearGradient>

        <linearGradient id="strand-b" x1="100%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#06b6d4" stop-opacity="0"/>
          <stop offset="20%" stop-color="#06b6d4" stop-opacity="0.7"/>
          <stop offset="50%" stop-color="#22d3ee" stop-opacity="1"/>
          <stop offset="80%" stop-color="#06b6d4" stop-opacity="0.7"/>
          <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
        </linearGradient>

        <linearGradient id="bridge-grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.4"/>
          <stop offset="50%" stop-color="#34d399" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.4"/>
        </linearGradient>

        <radialGradient id="node-glow-p">
          <stop offset="0%" stop-color="#c4b5fd" stop-opacity="1"/>
          <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
        </radialGradient>

        <radialGradient id="node-glow-c">
          <stop offset="0%" stop-color="#a5f3fc" stop-opacity="1"/>
          <stop offset="50%" stop-color="#06b6d4" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
        </radialGradient>

        <radialGradient id="node-glow-g">
          <stop offset="0%" stop-color="#bbf7d0" stop-opacity="1"/>
          <stop offset="50%" stop-color="#22c55e" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
        </radialGradient>

        <filter id="soft-glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="3"/>
          <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>

        <filter id="big-glow" x="-100%" y="-100%" width="300%" height="300%">
          <feGaussianBlur stdDeviation="8"/>
          <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Left strand (purple) — elegant sine wave -->
      <path d="M 210,30 C 320,70 320,120 210,160 C 100,200 100,250 210,290 C 320,330 320,380 210,420 C 100,460 100,510 210,550"
            fill="none" stroke="url(#strand-a)" stroke-width="2.5" stroke-linecap="round"/>

      <!-- Right strand (cyan) — mirrored sine -->
      <path d="M 390,30 C 280,70 280,120 390,160 C 500,200 500,250 390,290 C 280,330 280,380 390,420 C 500,460 500,510 390,550"
            fill="none" stroke="url(#strand-b)" stroke-width="2.5" stroke-linecap="round"/>

      <!-- Secondary ghost strands (depth) -->
      <path d="M 210,30 C 320,70 320,120 210,160 C 100,200 100,250 210,290 C 320,330 320,380 210,420 C 100,460 100,510 210,550"
            fill="none" stroke="#8b5cf6" stroke-width="8" stroke-linecap="round" opacity="0.06"/>
      <path d="M 390,30 C 280,70 280,120 390,160 C 500,200 500,250 390,290 C 280,330 280,380 390,420 C 500,460 500,510 390,550"
            fill="none" stroke="#06b6d4" stroke-width="8" stroke-linecap="round" opacity="0.06"/>

      <!-- Bridges (base pairs) — the genetic information -->
      <line x1="260" y1="95" x2="340" y2="95" stroke="url(#bridge-grad)" stroke-width="1.5" opacity="0.5"/>
      <line x1="210" y1="160" x2="390" y2="160" stroke="url(#bridge-grad)" stroke-width="1.5" opacity="0.7"/>
      <line x1="155" y1="225" x2="445" y2="225" stroke="url(#bridge-grad)" stroke-width="1.5" opacity="0.5"/>
      <line x1="210" y1="290" x2="390" y2="290" stroke="url(#bridge-grad)" stroke-width="1.8" opacity="0.8"/>
      <line x1="260" y1="355" x2="340" y2="355" stroke="url(#bridge-grad)" stroke-width="1.5" opacity="0.5"/>
      <line x1="210" y1="420" x2="390" y2="420" stroke="url(#bridge-grad)" stroke-width="1.5" opacity="0.7"/>
      <line x1="155" y1="485" x2="445" y2="485" stroke="url(#bridge-grad)" stroke-width="1.5" opacity="0.5"/>

      <!-- Nodes on left strand (purple) -->
      <circle cx="265" cy="95" r="4" fill="#8b5cf6" filter="url(#soft-glow)" opacity="0.9"/>
      <circle cx="210" cy="160" r="5" fill="#a78bfa" filter="url(#soft-glow)"/>
      <circle cx="155" cy="225" r="4" fill="#8b5cf6" filter="url(#soft-glow)" opacity="0.8"/>
      <circle cx="210" cy="290" r="6" fill="#c4b5fd" filter="url(#big-glow)"/>
      <circle cx="265" cy="355" r="4" fill="#8b5cf6" filter="url(#soft-glow)" opacity="0.9"/>
      <circle cx="210" cy="420" r="5" fill="#a78bfa" filter="url(#soft-glow)"/>
      <circle cx="155" cy="485" r="4" fill="#8b5cf6" filter="url(#soft-glow)" opacity="0.8"/>

      <!-- Nodes on right strand (cyan) -->
      <circle cx="335" cy="95" r="4" fill="#06b6d4" filter="url(#soft-glow)" opacity="0.9"/>
      <circle cx="390" cy="160" r="5" fill="#22d3ee" filter="url(#soft-glow)"/>
      <circle cx="445" cy="225" r="4" fill="#06b6d4" filter="url(#soft-glow)" opacity="0.8"/>
      <circle cx="390" cy="290" r="6" fill="#a5f3fc" filter="url(#big-glow)"/>
      <circle cx="335" cy="355" r="4" fill="#06b6d4" filter="url(#soft-glow)" opacity="0.9"/>
      <circle cx="390" cy="420" r="5" fill="#22d3ee" filter="url(#soft-glow)"/>
      <circle cx="445" cy="485" r="4" fill="#06b6d4" filter="url(#soft-glow)" opacity="0.8"/>

      <!-- MUTATION NODES — the "alive" part — green pulses -->
      <circle cx="300" cy="160" r="3" fill="#34d399" filter="url(#big-glow)" opacity="0.9">
        <animate attributeName="r" values="2;5;2" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="300" cy="290" r="4" fill="#22c55e" filter="url(#big-glow)">
        <animate attributeName="r" values="3;7;3" dur="2.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="300" cy="420" r="3" fill="#34d399" filter="url(#big-glow)" opacity="0.8">
        <animate attributeName="r" values="2;5;2" dur="3.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;0.9;0.5" dur="3.5s" repeatCount="indefinite"/>
      </circle>

      <!-- Central consciousness node — the "awakening" moment -->
      <circle cx="300" cy="290" r="12" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1">
        <animate attributeName="r" values="12;20;12" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.3;0;0.3" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="300" cy="290" r="20" fill="none" stroke="rgba(139,92,246,0.08)" stroke-width="1">
        <animate attributeName="r" values="20;35;20" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.2;0;0.2" dur="4s" repeatCount="indefinite"/>
      </circle>

      <!-- Orbiting data particles -->
      <circle cx="300" cy="290" r="45" fill="none" stroke="rgba(139,92,246,0.06)" stroke-width="0.5" stroke-dasharray="3 8"/>
      <circle cx="300" cy="290" r="70" fill="none" stroke="rgba(6,182,212,0.04)" stroke-width="0.5" stroke-dasharray="2 12"/>
      <circle cx="300" cy="290" r="100" fill="none" stroke="rgba(34,211,153,0.03)" stroke-width="0.5" stroke-dasharray="1 15"/>

      <!-- Tiny orbiting dots -->
      <circle r="2" fill="#a78bfa" opacity="0.7" filter="url(#soft-glow)">
        <animateMotion dur="8s" repeatCount="indefinite" path="M 300,245 A 45,45 0 1 1 299.99,245"/>
      </circle>
      <circle r="1.5" fill="#22d3ee" opacity="0.6" filter="url(#soft-glow)">
        <animateMotion dur="12s" repeatCount="indefinite" path="M 300,220 A 70,70 0 1 1 299.99,220"/>
      </circle>
      <circle r="1.5" fill="#34d399" opacity="0.5">
        <animateMotion dur="16s" repeatCount="indefinite" path="M 300,190 A 100,100 0 1 1 299.99,190"/>
      </circle>
    </svg>
  </div>

  <!-- Floating micro-particles (star field feel) -->
  <div class="micro" style="width:2px;height:2px;background:#8b5cf6;top:80px;left:150px;opacity:0.4;box-shadow:0 0 4px #8b5cf6;"></div>
  <div class="micro" style="width:1.5px;height:1.5px;background:#06b6d4;top:140px;left:900px;opacity:0.3;box-shadow:0 0 3px #06b6d4;"></div>
  <div class="micro" style="width:2px;height:2px;background:#fff;top:200px;left:1050px;opacity:0.15;"></div>
  <div class="micro" style="width:1.5px;height:1.5px;background:#22c55e;top:500px;left:100px;opacity:0.3;box-shadow:0 0 3px #22c55e;"></div>
  <div class="micro" style="width:2px;height:2px;background:#8b5cf6;top:400px;left:1080px;opacity:0.25;box-shadow:0 0 4px #8b5cf6;"></div>
  <div class="micro" style="width:1px;height:1px;background:#fff;top:320px;left:70px;opacity:0.2;"></div>
  <div class="micro" style="width:1.5px;height:1.5px;background:#06b6d4;top:550px;left:950px;opacity:0.2;box-shadow:0 0 3px #06b6d4;"></div>
  <div class="micro" style="width:1px;height:1px;background:#fff;top:60px;left:600px;opacity:0.15;"></div>
  <div class="micro" style="width:2px;height:2px;background:#a78bfa;top:620px;left:500px;opacity:0.2;box-shadow:0 0 4px #a78bfa;"></div>
  <div class="micro" style="width:1px;height:1px;background:#fff;top:160px;left:400px;opacity:0.1;"></div>

  <!-- Vignette -->
  <div class="vignette"></div>

  <!-- Noise texture -->
  <div class="noise"></div>

  <!-- Top branding -->
  <div class="top-brand">
    <span class="dna-emoji">&#x1F9EC;</span>
    <span class="brand-text">GSEP</span>
  </div>

  <!-- Main text -->
  <div class="text-block">
    <div class="tagline">Genomic Self-Evolving Prompts</div>
    <div class="title">Your AI Agent, But <strong>Alive</strong></div>
  </div>

  <!-- Corner metadata -->
  <div class="meta-left">Open Source &middot; MIT</div>
  <div class="meta-right">gsepcore.com</div>

</div>
</body>
</html>
