<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GSEP Thumbnail — 512x512</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 512px; height: 512px; overflow: hidden; font-family: 'Inter', sans-serif; background: #000; }

  .canvas {
    width: 512px; height: 512px;
    position: relative; overflow: hidden;
    background: #050508;
    display: flex; align-items: center; justify-content: center;
  }

  .glow {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, rgba(6,182,212,0.06) 40%, transparent 70%);
  }

  .dna-svg { position: relative; z-index: 10; width: 220px; height: 320px; margin-bottom: 10px; }
  .dna-svg svg {
    width: 100%; height: 100%;
    filter: drop-shadow(0 0 40px rgba(139,92,246,0.3)) drop-shadow(0 0 80px rgba(6,182,212,0.15));
  }

  .content { position: relative; z-index: 10; text-align: center; display: flex; flex-direction: column; align-items: center; }

  .brand {
    font-size: 48px; font-weight: 900; letter-spacing: 8px; color: #fff;
    text-shadow: 0 0 40px rgba(139,92,246,0.4);
  }

  .sub {
    font-size: 13px; font-weight: 400; letter-spacing: 3px; text-transform: uppercase;
    color: rgba(139,92,246,0.6); margin-top: 6px;
  }

  .vignette {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 5;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
  }

  .noise {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 50; opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="glow"></div>
  <div class="vignette"></div>
  <div class="noise"></div>

  <div class="content">
    <div class="dna-svg">
      <svg viewBox="0 0 220 320" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="sa" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.1"/>
            <stop offset="30%" stop-color="#a78bfa" stop-opacity="0.9"/>
            <stop offset="70%" stop-color="#8b5cf6" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.1"/>
          </linearGradient>
          <linearGradient id="sb" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.1"/>
            <stop offset="30%" stop-color="#22d3ee" stop-opacity="0.8"/>
            <stop offset="70%" stop-color="#06b6d4" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.1"/>
          </linearGradient>
          <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.3"/>
            <stop offset="50%" stop-color="#34d399" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.3"/>
          </linearGradient>
          <filter id="gl" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="gl2" x="-100%" y="-100%" width="300%" height="300%">
            <feGaussianBlur stdDeviation="6"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <path d="M 65,10 C 130,35 130,65 65,90 C 0,115 0,145 65,170 C 130,195 130,225 65,250 C 0,275 0,305 65,310"
              fill="none" stroke="url(#sa)" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M 155,10 C 90,35 90,65 155,90 C 220,115 220,145 155,170 C 90,195 90,225 155,250 C 220,275 220,305 155,310"
              fill="none" stroke="url(#sb)" stroke-width="2.5" stroke-linecap="round"/>

        <line x1="65" y1="90" x2="155" y2="90" stroke="url(#bg)" stroke-width="1.5" opacity="0.6"/>
        <line x1="33" y1="130" x2="187" y2="130" stroke="url(#bg)" stroke-width="1.5" opacity="0.5"/>
        <line x1="65" y1="170" x2="155" y2="170" stroke="url(#bg)" stroke-width="1.8" opacity="0.7"/>
        <line x1="33" y1="210" x2="187" y2="210" stroke="url(#bg)" stroke-width="1.5" opacity="0.5"/>
        <line x1="65" y1="250" x2="155" y2="250" stroke="url(#bg)" stroke-width="1.5" opacity="0.6"/>

        <circle cx="65" cy="90" r="5" fill="#a78bfa" filter="url(#gl)"/>
        <circle cx="155" cy="90" r="5" fill="#22d3ee" filter="url(#gl)"/>
        <circle cx="65" cy="170" r="6" fill="#c4b5fd" filter="url(#gl2)"/>
        <circle cx="155" cy="170" r="6" fill="#a5f3fc" filter="url(#gl2)"/>
        <circle cx="65" cy="250" r="5" fill="#a78bfa" filter="url(#gl)"/>
        <circle cx="155" cy="250" r="5" fill="#22d3ee" filter="url(#gl)"/>

        <circle cx="110" cy="170" r="4" fill="#22c55e" filter="url(#gl2)">
          <animate attributeName="r" values="3;6;3" dur="2.5s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
        </circle>
      </svg>
    </div>
    <div class="brand">GSEP</div>
    <div class="sub">Genomic Self-Evolving Prompts</div>
  </div>
</div>
</body>
</html>
