# Dependabot configuration for automated dependency updates
# https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  # npm dependencies — security updates only (no version bumps)
  - package-ecosystem: "npm"
    directory: "/packages/core"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    reviewers:
      - "luisvelasquez"
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "fix(security)"
      include: "scope"
    versioning-strategy: increase
    # Only allow patch updates (security fixes), ignore minor/major bumps
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  # GitHub Actions — security updates only
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    reviewers:
      - "luisvelasquez"
    labels:
      - "dependencies"
      - "ci"
      - "security"
    commit-message:
      prefix: "fix(ci)"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
