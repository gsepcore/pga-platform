name: Mirror Sync

on:
  push:
    branches: [main]

jobs:
  mirror:
    name: Sync to Mirror
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for complete mirror

      - name: Push to mirror
        run: |
          git remote add mirror https://x-access-token:${{ secrets.MIRROR_PAT }}@github.com/LuisvelMarketer/pga-platform-mirror.git
          git push mirror main --force
